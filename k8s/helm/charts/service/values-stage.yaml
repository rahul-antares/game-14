        protocol: TCP
    env:
      - name: GAME_ID
        value: "$(GAME_CORE)96"
      - name: GAME_VERSION
        value: "$(GAME_VERSION)"
      - name: RNG_VERSION
        value: "$(RNG_VERSION)"
      - name: NATS_HOST
