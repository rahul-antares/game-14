global:
  pdb:
    enabled: true
    minAvailable: 0

  replicaCount: 2

  strategy:
    maxUnavailable: 0
    maxSurge: 1

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

  nodeSelector:
    # cloud.google.com/compute-class: "autopilot"
    cloud.google.com/compute-class: "Balanced"

  # Use topologySpreadConstraints instead of affinity (modern approach)
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

  lifecycle:
    preStop:
      exec:
        command:
          - /bin/sh
          - -c
          - kill -TERM 1 && sleep 10

  terminationGracePeriodSeconds: 30

  image:
    tag: latest
    pullPolicy: Always
    pullSecret: regcred

  # service:
  #   port: 80

  security:
    runAsUser: 0
    allowPrivilegeEscalation: false

  envFrom:
    configMaps:
      - stage-bdg7360-config

  volumeMounts:
    - name: rng-lib
      mountPath: /rng/lib/librngapi-local.so
      subPath: librngapi-local.so
  volumes:
    - name: rng-lib
      configMap:
        name: rng-library-shared
        items:
          - key: librngapi-local.so
            path: librngapi-local.so
        defaultMode: 0755 # Use octal notation - readable and standard and its show 493 in decimal.

  resources:
    requests:
      cpu: "100m"
      memory: "150Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"

  env: # global env applies to all services
    - name: ENV
      value: "prod"
    - name: LOG_FORMAT
      value: "json"

  nameOverride: ""
  fullnameOverride: ""

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 120
          - type: Pods
            value: 1
            periodSeconds: 300
        selectPolicy: Min
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 2
            periodSeconds: 30
        selectPolicy: Max

# Define each service here ---------------------------------------------------------------------------------------->
